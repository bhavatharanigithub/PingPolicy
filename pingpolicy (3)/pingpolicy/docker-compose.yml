version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pingpolicy
      POSTGRES_USER: pingpolicy
      POSTGRES_PASSWORD: pingpolicy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingpolicy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  contract-registry-service:
    build: ./contract-registry-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pingpolicy
      DB_USER: pingpolicy
      DB_PASSWORD: pingpolicy
    depends_on:
      postgres:
        condition: service_healthy

  polling-alerting-service:
    build: ./polling-alerting-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pingpolicy
      DB_USER: pingpolicy
      DB_PASSWORD: pingpolicy
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REGISTRY_URL: http://contract-registry-service:8081
      POLL_FIXED_RATE_MS: 30000
      # ALERT_WEBHOOK_URL: https://hooks.slack.com/services/xxx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      contract-registry-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_REGISTRY_URL: http://localhost:8081
      VITE_MONITOR_URL: http://localhost:8082
    depends_on:
      - contract-registry-service
      - polling-alerting-service

volumes:
  pgdata:
