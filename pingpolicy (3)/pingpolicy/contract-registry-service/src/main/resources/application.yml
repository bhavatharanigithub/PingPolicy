server:
  port: 8081

spring:
  application:
    name: contract-registry-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pingpolicy}
    username: ${DB_USER:pingpolicy}
    password: ${DB_PASSWORD:pingpolicy}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
